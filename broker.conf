brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
listenPort = 10911
namesrvAddr = rocketmq-namesrv:9876
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH
# Required so the broker registers an IP host-side clients can reach.
# Without this the broker reports its container IP (e.g., 172.18.0.x) and
# any producer running on the host fails with "MQBrokerException: no route".
brokerIP1 = 127.0.0.1