spring:
  datasource:
    url: jdbc:h2:mem:taskdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.jdbc.time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379

rocketmq:
  name-server: localhost:9876
  producer-group: task-scheduling-producer-test
  topic: task-schedule-topic
  send-timeout-ms: 1000

scheduler:
  main-poll-interval-ms: 100
  backfill-interval-ms: 1000
  backfill-grace-seconds: 1
  batch-size: 100
  create-grace-seconds: 5

management:
  health:
    redis:
      enabled: false      # no real Redis in tests
